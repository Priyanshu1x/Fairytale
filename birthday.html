<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <!-- Prevent zooming on mobile for app-like feel -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Happy Birthday!</title>
  <link rel="stylesheet" href="birthday.css">
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;900&display=swap" rel="stylesheet">
</head>
<body>
  
  <!-- Rotate Device Overlay (Portrait Only) -->
  <div id="rotate-overlay">
    <div class="rotate-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="5" y="2" width="14" height="20" rx="2" ry="2"></rect>
        <path d="M12 18h.01"></path>
        <path d="M19 12h-2"></path>
        <path d="M5 12H3"></path>
        <path d="M12 6V4"></path>
      </svg>
    </div>
    <p>Please rotate your phone for the best birthday surprise 🎂</p>
  </div>

  <!-- Main Birthday Scene (16:9 Landscape) -->
  <div id="birthday-scene">
    <div id="stage">
      
      <!-- Background elements -->
      <div class="bg-stars"></div>
      
      <!-- Garlands (Jhaleri) -->
      <div class="garland garland-left">
        <svg viewBox="0 0 200 100" class="jhaleri">
          <path d="M0 0 Q 100 40 200 10" fill="none" stroke="#f4a7c1" stroke-width="2"/>
          <polygon points="10,6 25,45 40,11" fill="#ff7da9" />
          <polygon points="50,13 65,52 80,16" fill="#ffa7c4" />
          <polygon points="90,18 105,57 120,19" fill="#ff7da9" />
          <polygon points="130,19 145,56 160,16" fill="#ffa7c4" />
          <polygon points="170,14 185,50 200,9" fill="#ff7da9" />
        </svg>
      </div>
      <div class="garland garland-right">
        <svg viewBox="0 0 200 100" class="jhaleri">
          <path d="M0 10 Q 100 40 200 0" fill="none" stroke="#f4a7c1" stroke-width="2"/>
          <polygon points="0,9 15,50 30,14" fill="#ffa7c4" />
          <polygon points="40,16 55,56 70,19" fill="#ff7da9" />
          <polygon points="80,19 95,57 110,18" fill="#ffa7c4" />
          <polygon points="120,16 135,52 150,13" fill="#ff7da9" />
          <polygon points="160,11 175,45 190,6" fill="#ffa7c4" />
        </svg>
      </div>

      <!-- Left Side (Text & Cap) -->
      <div class="left-section">
        <div class="text-container">
          <h1 class="happy-text">
            <span>H</span><span>a</span><span>p</span><span>p</span><span>y</span>
          </h1>
          <h1 class="birthday-text">
            <span>B</span><span>i</span><span>r</span><span>t</span><span>h</span><span>d</span><span>a</span><span>y</span>
          </h1>
          
          <div class="birthday-cap">
            <svg viewBox="0 0 100 100">
              <polygon points="20,80 50,20 80,80" fill="#ff7da9" stroke="#333" stroke-width="4" stroke-linejoin="round"/>
              <circle cx="50" cy="20" r="10" fill="#ffa7c4" stroke="#333" stroke-width="4"/>
              <path d="M20,80 Q50,90 80,80" fill="#333"/>
              <!-- polka dots -->
              <circle cx="50" cy="45" r="5" fill="#333"/>
              <circle cx="35" cy="65" r="4" fill="#333"/>
              <circle cx="65" cy="65" r="4" fill="#333"/>
              <circle cx="42" cy="30" r="3" fill="#333"/>
              <circle cx="58" cy="30" r="3" fill="#333"/>
            </svg>
          </div>
        </div>

        <div class="m-date-pill">
          <span class="star-icon">★</span>
          <span class="date-text" contenteditable="true">17 June 2005</span>
          <span class="star-icon">★</span>
        </div>
      </div>

      <!-- Right Side (Bear & Balloons) -->
      <div class="right-section">
        <!-- Pink Balloons -->
        <div class="balloon balloon-1">
          <svg viewBox="0 0 100 150">
            <path d="M50 10 C 15 10, 15 60, 50 85 C 85 60, 85 10, 50 10" fill="#ffa7c4" stroke="#333" stroke-width="3"/>
            <path d="M45 85 L 55 85 L 50 93 Z" fill="#ffa7c4" stroke="#333" stroke-width="3"/>
            <path d="M50 93 Q 40 120, 60 150" fill="none" stroke="#333" stroke-width="2"/>
            <path d="M35 30 C 40 20, 55 25, 55 25" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
          </svg>
        </div>
        <div class="balloon balloon-2">
          <svg viewBox="0 0 100 150">
            <path d="M50 10 C 15 10, 15 60, 50 85 C 85 60, 85 10, 50 10" fill="#ff7da9" stroke="#333" stroke-width="3"/>
            <path d="M45 85 L 55 85 L 50 93 Z" fill="#ff7da9" stroke="#333" stroke-width="3"/>
            <path d="M50 93 Q 60 120, 40 150" fill="none" stroke="#333" stroke-width="2"/>
            <path d="M35 30 C 40 20, 55 25, 55 25" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
          </svg>
        </div>
        <div class="balloon balloon-3">
          <svg viewBox="0 0 100 150">
            <path d="M50 10 C 15 10, 15 60, 50 85 C 85 60, 85 10, 50 10" fill="#ffa7c4" stroke="#333" stroke-width="3"/>
            <path d="M45 85 L 55 85 L 50 93 Z" fill="#ffa7c4" stroke="#333" stroke-width="3"/>
            <path d="M50 93 Q 40 120, 60 150" fill="none" stroke="#333" stroke-width="2"/>
            <path d="M35 30 C 40 20, 55 25, 55 25" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
          </svg>
        </div>

        <div class="frame">
          <div class="bear-container">
            <!-- Background sparkles inside the circle -->
            <div class="circle-sparkle sparkle-1">✦</div>
            <div class="circle-sparkle sparkle-2">✦</div>
            <div class="circle-sparkle sparkle-3">✦</div>
            <div class="circle-sparkle sparkle-4">✦</div>
            
            <!-- Bear Image -->
            <img src="assets/cute_teddy_bear.png" alt="Cute Teddy Bear" class="teddy-bear-img">
          </div>
          
          <!-- Smiley Object -->
          <div class="smiley-face">
            <svg viewBox="0 0 100 100">
              <circle cx="50" cy="50" r="40" fill="#fff" stroke="#333" stroke-width="5"/>
              <circle cx="35" cy="40" r="5" fill="#333"/>
              <circle cx="65" cy="40" r="5" fill="#333"/>
              <path d="M 30 60 Q 50 80, 70 60" fill="none" stroke="#333" stroke-width="6" stroke-linecap="round"/>
            </svg>
          </div>

          <!-- Heart Bubble -->
          <div class="m-heart-bubble">
            <svg viewBox="0 0 100 100">
              <path d="M 10 30 C 10 10, 90 10, 90 30 C 90 55, 70 65, 50 80 L 35 95 L 35 75 C 15 65, 10 50, 10 30 Z" fill="#2d3359" stroke="#333" stroke-width="3" stroke-linejoin="round"/>
              <path d="M 35 35 C 35 25, 50 25, 50 40 C 50 25, 65 25, 65 35 C 65 50, 50 60, 50 60 C 50 60, 35 50, 35 35 Z" fill="#ffa7c4"/>
            </svg>
          </div>
          
          <!-- Small corner badge -->
          <div class="badge">
            <svg viewBox="0 0 100 100">
              <circle cx="50" cy="50" r="45" fill="#ffa7c4" stroke="#333" stroke-width="4"/>
              <path d="M 35 45 C 35 30, 50 30, 50 50 C 50 30, 65 30, 65 45 C 65 65, 50 75, 50 75 C 50 75, 35 65, 35 45 Z" fill="#d32f2f"/>
              <!-- Small dots around -->
              <circle cx="20" cy="50" r="3" fill="#333"/>
              <circle cx="80" cy="50" r="3" fill="#333"/>
              <circle cx="50" cy="20" r="3" fill="#333"/>
              <circle cx="50" cy="80" r="3" fill="#333"/>
            </svg>
          </div>
        </div>
        
        <div class="m-name-plate">
          <span class="heart-icon">♥</span>
          <span class="name-text" contenteditable="true">LUCKY</span>
          <span class="heart-icon">♥</span>
        </div>
      </div>

      <!-- Next Button -->
      <button class="btn-next" id="btn-next">Next →</button>

      <!-- Mobile Clouds -->
      <svg class="mobile-clouds" viewBox="0 0 100 20" preserveAspectRatio="none" style="display: none;">
        <path d="M0,20 L100,20 L100,10 Q95,5 90,10 Q85,0 75,10 Q65,5 55,10 Q45,0 35,10 Q25,5 15,10 Q5,0 0,10 Z" fill="#ffa8bc" opacity="0.6"/>
        <path d="M0,20 L100,20 L100,15 Q95,10 90,15 Q85,5 75,15 Q65,10 55,15 Q45,5 35,15 Q25,10 15,15 Q5,5 0,15 Z" fill="#ffffff" opacity="0.9"/>
      </svg>
    </div>
  </div>
    <div id="mobile-card" class="mobile-only">
        <!-- Bunting -->
        <div class="bunting-container">
            <svg class="bunting left" viewBox="0 0 100 50">
                <polygon points="0,0 25,40 50,0" fill="#F06B9A" stroke="#444444" stroke-width="2"/>
                <polygon points="50,0 75,30 100,0" fill="#F8AFCB" stroke="#444444" stroke-width="2"/>
                <path d="M0,0 Q50,15 100,0" fill="none" stroke="#444444" stroke-width="2"/>
            </svg>
            <svg class="bunting right" viewBox="0 0 100 50">
                <polygon points="0,0 25,40 50,0" fill="#F06B9A" stroke="#444444" stroke-width="2"/>
                <polygon points="50,0 75,30 100,0" fill="#F8AFCB" stroke="#444444" stroke-width="2"/>
                <path d="M0,0 Q50,15 100,0" fill="none" stroke="#444444" stroke-width="2"/>
            </svg>
        </div>

        <!-- Section 2: Title -->
        <div class="mobile-title">
            <span>Happy</span>
            <span>Birthday</span>
            <svg class="party-hat" viewBox="0 0 100 100">
               <polygon points="20,80 50,20 80,80" fill="#F48FB1" stroke="#3B2A3F" stroke-width="5"/>
               <circle cx="50" cy="15" r="10" fill="#C9B6FF" stroke="#3B2A3F" stroke-width="4"/>
               <path d="M15,80 Q50,95 85,80" fill="#3B2A3F"/>
               <circle cx="35" cy="50" r="5" fill="#FFF0F5"/>
               <circle cx="65" cy="65" r="5" fill="#FFF0F5"/>
               <circle cx="55" cy="35" r="4" fill="#FFF0F5"/>
            </svg>
        </div>

        <!-- Section 3: Date Pill -->
        <div class="m-date-pill">
            06 March 1998
        </div>

        <!-- Section 4: Bear Circle -->
        <div class="bear-circle-wrapper">
            <!-- Section 5: Balloons (placed behind circle but outside) -->
            <svg class="mobile-balloon mb-1" viewBox="0 0 50 100">
                <path d="M25,60 Q15,80 30,100" fill="none" stroke="#666666" stroke-width="2"/>
                <ellipse cx="25" cy="35" rx="20" ry="25" fill="#FF9FC4" stroke="none"/>
                <polygon points="25,58 20,65 30,65" fill="#FF9FC4" stroke="none"/>
                <ellipse cx="13" cy="22" rx="4" ry="10" fill="#FFD6E7" opacity="0.9" transform="rotate(-30 13 22)"/>
            </svg>
            <svg class="mobile-balloon mb-2" viewBox="0 0 50 100">
                <path d="M25,60 Q20,80 15,100" fill="none" stroke="#666666" stroke-width="2"/>
                <ellipse cx="25" cy="35" rx="20" ry="25" fill="#FFB3D1" stroke="none"/>
                <polygon points="25,58 20,65 30,65" fill="#FFB3D1" stroke="none"/>
                <ellipse cx="13" cy="22" rx="4" ry="10" fill="#FFE0EC" opacity="0.9" transform="rotate(-30 13 22)"/>
            </svg>
            <svg class="mobile-balloon mb-3" viewBox="0 0 50 100">
                <ellipse cx="25" cy="35" rx="15" ry="20" fill="#ffa8bc" stroke="#333" stroke-width="2"/>
                <polygon points="25,55 20,60 30,60" fill="#ffa8bc" stroke="#333" stroke-width="2"/>
                <path d="M25,60 Q20,75 30,90" fill="none" stroke="#333" stroke-width="2"/>
            </svg>

            <!-- Main Circle -->
            <div class="bear-circle">
                <img src="assets/cute_teddy_bear.png" alt="Teddy Bear">
                <div class="m-sparkle m-s1">
                    <svg viewBox="0 0 100 100"><path d="M50 5 C50 40 60 50 95 50 C60 50 50 60 50 95 C50 60 40 50 5 50 C40 50 50 40 50 5 Z" fill="#FFC1D6"/></svg>
                </div>
                <div class="m-sparkle m-s2">
                    <svg viewBox="0 0 100 100">
                        <path d="M50 5 C50 40 60 50 95 50 C60 50 50 60 50 95 C50 60 40 50 5 50 C40 50 50 40 50 5 Z" fill="#FF9FC4"/>
                        <path d="M50 5 C50 40 60 50 95 50 C60 50 50 60 50 95 C50 60 40 50 5 50 C40 50 50 40 50 5 Z" fill="#FF9FC4" transform="rotate(45 50 50) scale(0.6)"/>
                    </svg>
                </div>
                <div class="m-sparkle m-s3">
                    <svg viewBox="0 0 100 100"><path d="M50 5 C50 40 60 50 95 50 C60 50 50 60 50 95 C50 60 40 50 5 50 C40 50 50 40 50 5 Z" fill="#FFD6E7"/></svg>
                </div>
                <div class="m-sparkle m-s4">
                    <svg viewBox="0 0 100 100"><path d="M50 5 C50 40 60 50 95 50 C60 50 50 60 50 95 C50 60 40 50 5 50 C40 50 50 40 50 5 Z" fill="#FF9FC4"/></svg>
                </div>
            </div>
            
            <!-- Decorations -->
            <div class="smiley">
                <svg viewBox="0 0 100 100" width="100%" height="100%">
                    <circle cx="50" cy="50" r="45" fill="#FFB6D5" stroke="#222" stroke-width="4"/>
                    <ellipse cx="25" cy="25" rx="6" ry="12" fill="#FFFFFF" opacity="0.6" transform="rotate(-40 25 25)"/>
                    <path d="M25,45 Q32,35 40,45" fill="none" stroke="#4A3A4A" stroke-width="4" stroke-linecap="round"/>
                    <path d="M60,45 Q67,35 75,45" fill="none" stroke="#4A3A4A" stroke-width="4" stroke-linecap="round"/>
                    <path d="M45,60 Q50,70 55,60" fill="none" stroke="#4A3A4A" stroke-width="4" stroke-linecap="round"/>
                </svg>
            </div>
            <div class="m-heart-bubble">
                <svg viewBox="0 0 100 100" width="100%" height="100%">
                    <path d="M90,50 C90,75 75,90 50,90 C35,90 20,100 10,100 C10,100 15,85 15,75 C5,65 10,45 10,35 C10,15 30,10 50,10 C75,10 90,25 90,50 Z" fill="#FFB6D5" stroke="#4A3A4A" stroke-width="4" stroke-linejoin="round"/>
                    <path d="M50,70 L45,65 C30,50 25,40 25,30 C25,20 35,15 45,20 C50,23 50,23 55,20 C65,15 75,20 75,30 C75,40 70,50 55,65 Z" fill="#FF5E9C" stroke="none"/>
                </svg>
            </div>
        </div>

        <!-- Section 6: Name Plate -->
        <div class="m-name-plate">
            <svg width="18" height="18" viewBox="0 0 100 100"><path d="M50,85 L45,80 C25,60 15,45 15,30 C15,15 30,5 45,15 C50,20 50,20 55,15 C70,5 85,15 85,30 C85,45 75,60 55,80 Z" fill="#FF5E9C"/></svg>
            <span>LUCKY</span>
            <svg width="18" height="18" viewBox="0 0 100 100"><path d="M50,85 L45,80 C25,60 15,45 15,30 C15,15 30,5 45,15 C50,20 50,20 55,15 C70,5 85,15 85,30 C85,45 75,60 55,80 Z" fill="#FF5E9C"/></svg>
        </div>

        <!-- Section 7: Next Button -->
        <button class="next-btn">
            Next &rarr;
        </button>

        <!-- Bottom Clouds -->
        <div class="clouds-container">
            <svg viewBox="0 0 100 20" preserveAspectRatio="none">
                <path d="M0,20 L100,20 L100,10 Q95,5 90,10 Q85,0 75,10 Q65,5 55,10 Q45,0 35,10 Q25,5 15,10 Q5,0 0,10 Z" fill="#ffa8bc" opacity="0.6"/>
                <path d="M0,20 L100,20 L100,15 Q95,10 90,15 Q85,5 75,15 Q65,10 55,15 Q45,5 35,15 Q25,10 15,15 Q5,5 0,15 Z" fill="#ffffff" opacity="0.9"/>
            </svg>
        </div>
    </div>

  <script src="birthday.js"></script>
</body>
</html>
